openapi: 3.0.3
info:
  title: Medical Imaging Backend API
  version: 1.0.0
servers:
  - url: http://localhost:5001
tags:
  - name: Auth
  - name: Xray
  - name: History

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ApiError:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
        error:
          type: object
          properties:
            code:
              type: string
            details:
              type: object
              nullable: true
      required: [success, message]

    UserBrief:
      type: object
      properties:
        id: { type: integer }
        email: { type: string }
        name: { type: string }

    LoginResponse:
      type: object
      properties:
        success: { type: boolean, example: true }
        message: { type: string, example: "Login successful" }
        data:
          type: object
          properties:
            token: { type: string }
            role: { type: string, example: "patient" }
            user:
              $ref: '#/components/schemas/UserBrief'
        # Back-compat legacy top-level fields:
        token: { type: string }
        role: { type: string }
        user:
          $ref: '#/components/schemas/UserBrief'
      required: [success, message]

    SignupResponse:
      allOf:
        - $ref: '#/components/schemas/LoginResponse'
      example:
        success: true
        message: "Signup successful"
        data:
          token: "..."
          role: "doctor"
          user: { id: 1, email: "d@x.com", name: "Dr X" }
        token: "..."
        role: "doctor"
        user: { id: 1, email: "d@x.com", name: "Dr X" }

paths:
  /health:
    get:
      tags: [History]
      summary: Health check
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }

  /:
    get:
      summary: API root
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  health: { type: string }

  /auth/signup:
    post:
      tags: [Auth]
      summary: Create an account (doctor or patient)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                role: { type: string, enum: [doctor, patient] }
                name: { type: string }
                email: { type: string }
                password: { type: string, minLength: 8 }
                specialization: { type: string, nullable: true }
                medical_certificate: { type: string, nullable: true }
                gender: { type: string, nullable: true }
                dob: { type: string, nullable: true }
                medical_history: { type: string, nullable: true }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignupResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /auth/login:
    post:
      tags: [Auth]
      summary: Login (doctor or patient)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                role: { type: string, enum: [doctor, patient] }
                email: { type: string }
                password: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/xray/upload:
    post:
      tags: [Xray]
      summary: Upload an X-ray (multipart)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                xray:
                  type: string
                  format: binary
                patient_id:
                  type: integer
                  nullable: true
      responses:
        '201':
          description: Uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string, example: Uploaded }
                  data:
                    type: object
                    properties:
                      xray: { type: object }
                  # Back-compat legacy top-level field:
                  xray: { type: object }
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/xray/analyze/{id}:
    post:
      tags: [Xray]
      summary: Analyze an uploaded X-ray using the AI service
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: XrayImage.id
      responses:
        '200':
          description: Analysis complete
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string, example: Analysis complete }
                  data:
                    type: object
                    properties:
                      result: { type: object }
                  # Back-compat legacy top-level field:
                  result: { type: object }
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/history/patient/{id}:
    get:
      tags: [History]
      summary: Get patient history
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    type: object
                    properties:
                      patient_id: { type: integer }
                      xrays: { type: array, items: { type: object } }
                  # Back-compat legacy top-level fields:
                  patient_id: { type: integer }
                  xrays: { type: array, items: { type: object } }

  /api/history/doctor:
    get:
      tags: [History]
      summary: Get doctor history (doctor role)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    type: object
                    properties:
                      doctor_id: { type: integer }
                      reports: { type: array, items: { type: object } }
                  # Back-compat legacy top-level fields:
                  doctor_id: { type: integer }
                  reports: { type: array, items: { type: object } }

